<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header>
    <h1>Campus Sports Hub</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about-us.html">About</a>
</nav>

<section>
    <h2>Sports Events</h2>

    <div class="card">
        <h3>Football Tournament</h3>
        <p>Join our campus football championship.</p>
        <button>Join</button>
    </div>

    <div class="card">
        <h3>Basketball Challenge</h3>
        <p>Compete with other students in basketball.</p>
        <button>Join</button>
    </div>

    <div class="card">
        <h3>Running Marathon</h3>
        <p>Participate in our annual marathon event.</p>
        <button>Join</button>
    </div>

</section>

<section>
    <h2>Join an Event</h2>

    <form>

        <label>Full Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Student ID:</label><br>
        <input type="text" name="id"><br><br>

        <label>Select Sport:</label><br>
        <select name="sport">
            <option>Football</option>
            <option>Basketball</option>
            <option>Running</option>
        </select><br><br>

        <label>Skill Level:</label><br>
        <select name="level">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select><br><br>

        <input type="submit" value="Submit">
    </form>

</section>

<footer>
    <p>© 2026 Campus Sports Hub</p>
</footer>

</body>
</html>
